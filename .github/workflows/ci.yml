name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent_sos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.3"
          otp-version: "27.3"

      - name: Build and test
        env:
          MIX_ENV: test
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          MIX_ENV=test mix compile
          echo "Build dir contents:"
          ls -la _build/ || true
          ls _build/test/lib/agent_sos/ebin/ | wc -l || echo "no ebin"
          MIX_ENV=test mix ecto.create
          MIX_ENV=test mix ecto.migrate
          MIX_ENV=test mix test
