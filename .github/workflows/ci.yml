name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent_sos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.3"
          otp-version: "27.2"

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile and test
        run: |
          mix compile
          echo "=== BEAM files in ebin ==="
          ls _build/test/lib/agent_sos/ebin/*.beam 2>/dev/null | wc -l
          ls _build/test/lib/agent_sos/ebin/ 2>/dev/null | grep Repo || echo "NO REPO BEAM"
          echo "=== All ebin files ==="
          ls _build/test/lib/agent_sos/ebin/ 2>/dev/null | head -20
          mix run -e 'IO.inspect(Code.ensure_loaded(AgentSos.Repo))'
          mix ecto.create
          mix ecto.migrate
          mix test
